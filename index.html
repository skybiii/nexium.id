<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA CAPITAL -  Investment Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0b;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            padding: 60px 40px;
        }

        /* Logo */
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #0b0b0b;
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateY(-50px);
            animation: logoFadeIn 1.2s ease-out 0.3s forwards;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes logoFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Judul */
        .title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        /* Deskripsi */
        .description {
            font-size: 1.2rem;
            font-weight: 400;
            color: #b8b8b8;
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out 1.1s forwards;
        }

        .description-highlight {
            font-weight: 500;
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
        }

        .description-focus {
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-top: 12px;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 48px;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUp 1s ease-out 1.4s forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            color: #0b0b0b;
            background: #ffffff;
            min-width: 220px;
            justify-content: center;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(255, 255, 255, 0.15),
                0 0 40px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .btn i {
            font-size: 1.1rem;
        }

        /* Footer */
        .footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.7s forwards;
        }

        /* Parallax Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,119,198,0.2) 0%, transparent 50%);
            z-index: -1;
            opacity: 0.5;
            transform: translateZ(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                min-width: 280px;
                width: 100%;
                max-width: 320px;
            }
            
            .logo {
                width: 100px;
                height: 100px;
                font-size: 2rem;
            }
        }

        /* Scroll animations */
        @media (prefers-reduced-motion: no-preference) {
            body {
                scroll-behavior: smooth;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="logo">
            <img src="nexa.png" width="200">
            <i class="fas fa-chart-line"></i>
        </div>

        <h1 class="title">NEXA CAPITAL</h1>     
        
        <div class="description">
            <span class="description-highlight">
                Insight & strategi di pasar saham
            </span>
            <span>IPO | Swing | Multibagger</span>
            <span class="description-focus">
                Fokus pada timing, bukan sekadar ikut tren
            </span>
        </div>
        
        <div class="buttons">
            <a href="https://whatsapp.com/channel/0029VbCHm9QFHWq8Vx0teh01" target="_blank" class="btn">
                <i class="fab fa-whatsapp"></i>
                Join Komunitas WA (FREE)
            </a>
            <a href="https://t.me/nexiumid" target="_blank" class="btn">
                <i class="fab fa-telegram-plane"></i>
                Join Komunitas Telegram (FREE)
            </a>
        </div>
        
        <div class="footer">
            © 2026 Nexa Capital. All rights reserved.
        </div>
    </div>

    <script>
        // Subtle parallax effect on background
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const parallax = document.querySelector('.bg-overlay');
            const speed = scrolled * 0.5;
            parallax.style.transform = `translateY(${speed}px)`;
        });

        // Smooth mouse movement glow effect on buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                btn.style.background = `radial-gradient(200px circle at ${x}px ${y}px, rgba(255,255,255,0.3) 0%, #ffffff 70%)`;
            });
            
            btn.addEventListener('mouseleave', () => {
                btn.style.background = '#ffffff';
            });
        });

        // Preload critical assets
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.style.opacity = '1';
            });
        } else {
            document.body.style.opacity = '1';
        }
    </script>
</body>
</html>
